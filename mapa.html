<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SATC Maps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #1a1a1a;
    }

    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      background: #1e4d5e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 50px;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
    }
    .back-btn {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s;
      flex-shrink: 0;
    }
    .back-btn:hover, .back-btn:active { background: rgba(255,255,255,.3); }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: .4px; flex-shrink: 0; }
    .logo span { color: #7dd3e8; }
    .sep { opacity: .3; flex-shrink: 0; }
    .topbar-sub {
      font-size: 12px; opacity: .8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }

    /* ── Map ── */
    .map-area {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #181818;
      cursor: grab;
      touch-action: none;
    }
    .map-area.grabbing { cursor: grabbing; }

    #map-container {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #map-img {
      display: block;
      pointer-events: none;
    }

    /* Route SVG (same size as image, sits on top) */
    #route-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* Animated route line */
    .route-line {
      stroke: #1a73e8;
      stroke-width: 3.5;
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 12 8;
      stroke-dashoffset: 0;
      animation: march 0.8s linear infinite;
      filter: drop-shadow(0 0 4px rgba(26,115,232,.6));
    }
    @keyframes march {
      to { stroke-dashoffset: -20; }
    }

    /* Route endpoints */
    .route-dot-dest {
      fill: none;
      stroke: #1a73e8;
      stroke-width: 2.5;
    }

    /* Building labels */
    .bl {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(20,60,75,.82);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: .3px;
      transition: background .2s, transform .2s;
    }
    .bl.destino {
      background: #e53935;
      font-size: 10px;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 2px 8px rgba(229,57,53,.5);
    }

    /* Destination pin */
    .pin-wrap {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: none;
      animation: drop .4s cubic-bezier(.175,.885,.32,1.275) forwards;
    }
    @keyframes drop {
      0%   { transform: translate(-50%,-160%) scale(.4); opacity:0; }
      100% { transform: translate(-50%,-100%) scale(1);  opacity:1; }
    }
    .pin-wrap svg { filter: drop-shadow(0 3px 8px rgba(0,0,0,.6)); }
    .pulse {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 7px;
      border-radius: 50%;
      background: rgba(229,57,53,.4);
      animation: pulseAnim 1.7s ease-out infinite;
    }
    @keyframes pulseAnim {
      0%   { transform: translateX(-50%) scale(1);   opacity:.8; }
      100% { transform: translateX(-50%) scale(2.8); opacity:0;  }
    }

    /* "Você está aqui" marker */
    .here-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: here-pop .5s .2s cubic-bezier(.175,.885,.32,1.275) both;
      z-index: 4;
    }
    @keyframes here-pop {
      0%   { transform: translate(-50%,-50%) scale(0); opacity:0; }
      100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
    }
    .here-outer {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(26,115,232,.25);
      display: flex; align-items: center; justify-content: center;
      animation: here-ring 2s ease-out infinite;
    }
    @keyframes here-ring {
      0%   { box-shadow: 0 0 0 0 rgba(26,115,232,.45); }
      70%  { box-shadow: 0 0 0 10px rgba(26,115,232,0); }
      100% { box-shadow: 0 0 0 0 rgba(26,115,232,0); }
    }
    .here-inner {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #1a73e8;
      border: 2.5px solid #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,.4);
    }
    .here-label {
      position: absolute;
      top: -22px; left: 50%;
      transform: translateX(-50%);
      background: #1a73e8;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      white-space: nowrap;
      letter-spacing: .3px;
    }
    .here-label::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #1a73e8;
    }

    /* ── Zoom buttons ── */
    .zoom-btns {
      position: absolute;
      right: 14px;
      bottom: 220px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 20;
    }
    .zoom-btns button {
      width: 40px; height: 40px;
      background: #fff;
      border: 1px solid #bbb;
      border-radius: 10px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      transition: background .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-btns button:hover, .zoom-btns button:active { background: #e8f4f7; }

    /* ── Bottom sheet ── */
    .bottom-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 25;
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.28);
      animation: sheet-up .35s cubic-bezier(.25,.8,.25,1) forwards;
      max-height: 55vh;
      display: flex;
      flex-direction: column;
    }
    @keyframes sheet-up {
      from { transform: translateY(100%); opacity:0; }
      to   { transform: translateY(0);    opacity:1; }
    }

    .handle {
      width: 38px; height: 4px;
      background: #d0d8db;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #eef2f3;
      flex-shrink: 0;
    }
    .sheet-predio-tag {
      display: inline-block;
      background: #1e4d5e;
      color: #fff;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }
    .sheet-disc {
      font-size: 14px;
      font-weight: 700;
      color: #1a2e35;
      line-height: 1.35;
    }

    .sheet-body {
      padding: 12px 16px 20px;
      overflow-y: auto;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
    }

    .info-tile {
      background: #f3f8f9;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-tile.full { grid-column: 1 / -1; }
    .tile-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .tile-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #7a9ea8;
      display: block;
      margin-bottom: 1px;
    }
    .tile-val {
      font-size: 13px;
      font-weight: 700;
      color: #1a2e35;
      line-height: 1.2;
    }

    /* Route distance badge */
    .route-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #e8f4fd;
      border: 1px solid #bcd8f0;
      border-radius: 12px;
      padding: 8px 12px;
      grid-column: 1 / -1;
    }
    .route-badge .rb-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1a73e8;
      flex-shrink: 0;
    }
    .route-badge .rb-text {
      font-size: 12px;
      color: #1a4a7a;
      font-weight: 600;
    }

    /* Andar badge dentro do tile */
    .andar-badge {
      display: inline-block;
      background: #1e4d5e;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      margin-top: 2px;
    }

    /* Instrução de navegação */
    .nav-tile {
      grid-column: 1 / -1;
      background: #fff8e6;
      border: 1px solid #f0d080;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .nav-tile .nav-icon {
      font-size: 22px;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 1px;
    }
    .nav-tile .nav-body {}
    .nav-tile .nav-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #a07820;
      display: block;
      margin-bottom: 4px;
    }
    .nav-tile .nav-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .nav-tile .nav-steps li {
      font-size: 12.5px;
      font-weight: 600;
      color: #5a3e00;
      display: flex;
      gap: 7px;
      align-items: flex-start;
      line-height: 1.35;
    }
    .nav-tile .nav-steps li .step-num {
      background: #e8a000;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Map (full screen) -->
  <div class="map-area" id="map-area">
    <div id="map-container">
      <img id="map-img" src="Group_20.png" alt="Mapa SATC" draggable="false">

      <!-- Route SVG (injected by JS) -->
      <svg id="route-svg"></svg>

      <!-- Building labels posicionados via JS (coordenadas calibradas) -->
      <div class="bl" id="bl-05">P.05</div>
      <div class="bl" id="bl-07">P.07</div>
      <div class="bl" id="bl-08">P.08</div>
      <div class="bl" id="bl-09">P.09</div>
      <div class="bl" id="bl-10">P.10</div>
      <div class="bl" id="bl-11">P.11</div>
      <div class="bl" id="bl-12">P.12</div>
      <div class="bl" id="bl-13">P.13</div>
      <div class="bl" id="bl-14">P.14</div>
      <div class="bl" id="bl-20">P.20</div>
      <div class="bl" id="bl-22">P.22</div>
      <div class="bl" id="bl-23">P.23</div>
      <div class="bl" id="bl-24">P.24</div>

      <!-- "Você está aqui" (injected by JS) -->
      <div id="here-el"></div>

      <!-- Destination pin (injected by JS) -->
      <div id="pin-el"></div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-btns" id="zoom-btns">
      <button id="btn-zi" title="Aproximar">+</button>
      <button id="btn-zo" title="Afastar">−</button>
      <button id="btn-zr" title="Ver rota" style="font-size:14px;">⊡</button>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Voltar
    </button>
    <div class="logo">SATC <span>Maps</span></div>
    <span class="sep">|</span>
    <span class="topbar-sub" id="topbar-sub">Localização da sala</span>
  </div>

  <!-- Bottom sheet -->
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="handle"></div>
    <div class="sheet-header">
      <span class="sheet-predio-tag" id="sb-predio">—</span>
      <div class="sheet-disc" id="sb-disc">—</div>
    </div>
    <div class="sheet-body">
      <!-- Route indicator -->
      <div class="route-badge">
        <div class="rb-dot"></div>
        <span class="rb-text" id="rb-text">Calculando rota...</span>
      </div>

      <div class="info-tile full">
        <span class="tile-icon">🚪</span>
        <div class="tile-text">
          <span class="tile-lbl">Sala</span>
          <span class="tile-val" id="sb-sala">—</span>
        </div>
      </div>
      <div class="info-tile full">
        <span class="tile-icon">🕐</span>
        <div class="tile-text">
          <span class="tile-lbl">Horário</span>
          <span class="tile-val" id="sb-horario">—</span>
        </div>
      </div>
      <div class="info-tile">
        <span class="tile-icon">👥</span>
        <div class="tile-text">
          <span class="tile-lbl">Turma</span>
          <span class="tile-val" id="sb-turma">—</span>
        </div>
      </div>
      <div class="info-tile">
        <span class="tile-icon">🪑</span>
        <div class="tile-text">
          <span class="tile-lbl">Vagas</span>
          <span class="tile-val" id="sb-vagas">—</span>
        </div>
      </div>

      <!-- Andar -->
      <div class="info-tile full">
        <span class="tile-icon">🏢</span>
        <div class="tile-text">
          <span class="tile-lbl">Localização no prédio</span>
          <span class="tile-val" id="sb-andar">—</span>
          <span class="andar-badge" id="sb-andar-badge" style="display:none"></span>
        </div>
      </div>

      <!-- Instrução de navegação -->
      <div class="nav-tile">
        <span class="nav-icon">🧭</span>
        <div class="nav-body">
          <span class="nav-lbl">Como chegar</span>
          <ul class="nav-steps" id="sb-nav-steps">
            <li><span class="step-num">1</span><span>Entre pelo acesso principal do prédio</span></li>
            <li><span class="step-num">2</span><span>Siga o corredor até a sala indicada</span></li>
          </ul>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  // ── Botão Voltar ──
  document.getElementById('back-btn').addEventListener('click', () => {
    if (window.history.length > 1 && document.referrer) {
      window.history.back();
    } else {
      window.location.href = 'index.html';
    }
  });

  // ── Informações de navegação por prédio ──
  const BUILDING_INFO = {
    '07': {
      andar: 'Térreo',
      badge: '1º Andar',
      steps: [
        'Entre pela porta principal do Prédio 07',
        'Vire à direita no corredor central',
        'A sala está no final do corredor, à esquerda'
      ]
    },
    '22': {
      andar: '2º Andar',
      badge: '2º Andar',
      steps: [
        'Entre pelo Prédio 22 pela entrada frontal',
        'Suba as escadas ou use o elevador ao fundo do hall',
        'No 2º andar, vire à direita — sala sinalizada na parede'
      ]
    },
    '24': {
      andar: '1º Andar',
      badge: '1º Andar',
      steps: [
        'Entre pela entrada lateral do Prédio 24',
        'Siga o corredor principal em frente',
        'A sala fica à esquerda antes da saída dos fundos'
      ]
    },
    'default': {
      andar: 'Verifique no local',
      badge: null,
      steps: [
        'Dirija-se ao prédio indicado',
        'Consulte o mapa no hall de entrada ou a recepção'
      ]
    }
  };

  // Detectar andar pelo código da sala (formato X.YY.ZZ → X = andar)
  function getAndarFromSala(salaCode) {
    const m = salaCode.match(/^(\d+)\./);
    if (!m) return null;
    const n = parseInt(m[1]);
    if (n <= 1) return 'Térreo / 1º Andar';
    return `${n}º Andar`;
  }

  // ── Posições calibradas manualmente com calibrar.html ──
  const PREDIOS = {
    '05': { px: 80.5, py: 39.9 },
    '07': { px: 78.1, py: 46.3 },
    '08': { px: 68.0, py: 52.6 },
    '09': { px: 60.4, py: 46.4 },
    '10': { px: 60.7, py: 30.3 },
    '11': { px: 44.8, py: 40.9 },
    '12': { px: 54.2, py: 49.0 },
    '13': { px: 77.1, py: 55.5 },
    '14': { px: 60.7, py: 53.4 },
    '20': { px: 35.1, py: 57.2 },
    '22': { px: 65.3, py: 94.6 },
    '23': { px: 59.8, py: 86.3 },
    '24': { px: 60.7, py: 80.3 },
    'default': { px: 50.0, py: 50.0 }
  };

  // Posições aleatórias possíveis para "Você está aqui"
  // Baseadas em áreas de circulação/calçadas visíveis no satélite
  // Áreas de circulação baseadas nas coordenadas calibradas
  const HERE_CANDIDATES = [
    { px: 52.0, py: 43.0 },  // corredor entre P.09 e P.11
    { px: 70.0, py: 42.0 },  // pátio entre P.05 e P.07
    { px: 38.0, py: 50.0 },  // calçada oeste (perto P.11/P.20)
    { px: 63.0, py: 62.0 },  // corredor entre P.08/P.14 e P.24
    { px: 55.0, py: 73.0 },  // calçada sul (entre P.23 e P.24)
    { px: 45.0, py: 57.0 },  // área central sul (perto P.20)
  ];

  const herePos = HERE_CANDIDATES[Math.floor(Math.random() * HERE_CANDIDATES.length)];

  // ── URL params ──
  const qp      = new URLSearchParams(window.location.search);
  const disc    = qp.get('disciplina') || '—';
  const sala    = qp.get('sala')       || '—';
  const predio  = qp.get('predio')     || '';
  const horario = qp.get('horario')    || '—';
  const turma   = qp.get('turma')      || '—';
  const vagas   = qp.get('vagas')      || '—';

  // ── Preencher UI ──
  document.getElementById('sb-disc').textContent    = disc;
  document.getElementById('sb-sala').textContent    = sala;
  document.getElementById('sb-horario').textContent = horario;
  document.getElementById('sb-turma').textContent   = turma;
  document.getElementById('sb-vagas').textContent   = vagas;
  document.getElementById('topbar-sub').textContent = sala !== '—' ? sala : 'Localização da sala';
  document.getElementById('sb-predio').textContent  = predio
    ? 'PRÉDIO ' + predio.replace(/^0+/, '')
    : 'Local Indefinido';

  // ── Andar + instruções ──
  const bInfo = BUILDING_INFO[predio] || BUILDING_INFO['default'];

  // Prioriza o andar detectado pelo código da sala; usa o do prédio como fallback
  const andarDetectado = getAndarFromSala(sala);
  document.getElementById('sb-andar').textContent = andarDetectado || bInfo.andar;

  const badge = document.getElementById('sb-andar-badge');
  const badgeLabel = andarDetectado || bInfo.badge;
  if (badgeLabel) {
    badge.textContent = badgeLabel;
    badge.style.display = 'inline-block';
  }

  const stepsList = document.getElementById('sb-nav-steps');
  stepsList.innerHTML = bInfo.steps
    .map((s, i) => `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`)
    .join('');

  // ── Referências do mapa ──
  const area      = document.getElementById('map-area');
  const container = document.getElementById('map-container');
  const img       = document.getElementById('map-img');

  let scale = 1, tx = 0, ty = 0;
  let imgNW = 0, imgNH = 0;

  const pinKey = predio && PREDIOS[predio] ? predio : 'default';
  const pinPos = PREDIOS[pinKey];

  function posLabel(id, pxPct, pyPct) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.left = (imgNW * pxPct / 100) + 'px';
    el.style.top  = (imgNH * pyPct / 100) + 'px';
  }

  function setupOverlays() {
    imgNW = img.offsetWidth;
    imgNH = img.offsetHeight;
    container.style.width  = imgNW + 'px';
    container.style.height = imgNH + 'px';

    // Labels de todos os prédios do Group 20.png
    ['05','07','08','09','10','11','12','13','14','20','22','23','24'].forEach(n => {
      const info = PREDIOS[n];
      if (info) posLabel('bl-' + n, info.px, info.py);
    });
    // Destaca label do prédio selecionado
    if (predio) {
      const destEl = document.getElementById('bl-' + predio.replace(/^0+/, '').padStart(2,'0'));
      if (destEl) destEl.classList.add('destino');
    }

    // Coordenadas em px
    const hx = imgNW * herePos.px / 100;
    const hy = imgNH * herePos.py / 100;
    const dx = imgNW * pinPos.px  / 100;
    const dy = imgNH * pinPos.py  / 100;

    // ── SVG de rota ──
    const svg = document.getElementById('route-svg');
    svg.setAttribute('width',  imgNW);
    svg.setAttribute('height', imgNH);
    svg.setAttribute('viewBox', `0 0 ${imgNW} ${imgNH}`);

    // Linha tracejada animada
    svg.innerHTML = `
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8"
                refX="4" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#1a73e8"/>
        </marker>
      </defs>
      <!-- sombra da linha -->
      <line x1="${hx}" y1="${hy}" x2="${dx}" y2="${dy}"
            stroke="rgba(0,0,0,.25)" stroke-width="6"
            stroke-linecap="round"/>
      <!-- linha da rota -->
      <line x1="${hx}" y1="${hy}" x2="${dx}" y2="${dy}"
            class="route-line"
            marker-end="url(#arrowhead)"/>
    `;

    // ── "Você está aqui" ──
    const hereEl = document.getElementById('here-el');
    hereEl.style.position = 'absolute';
    hereEl.style.left = hx + 'px';
    hereEl.style.top  = hy + 'px';
    hereEl.innerHTML = `
      <div class="here-marker">
        <div class="here-label">Você está aqui</div>
        <div class="here-outer">
          <div class="here-inner"></div>
        </div>
      </div>`;

    // ── Pin de destino ──
    const pinEl = document.getElementById('pin-el');
    pinEl.style.position = 'absolute';
    pinEl.style.left = dx + 'px';
    pinEl.style.top  = dy + 'px';
    pinEl.innerHTML = `
      <div class="pin-wrap">
        <div class="pulse"></div>
        <svg width="36" height="42" viewBox="0 0 22 26" fill="none">
          <path d="M11 0C7.13 0 4 3.13 4 7c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#e53935"/>
          <circle cx="11" cy="7" r="3.2" fill="#fff"/>
        </svg>
      </div>`;

    // ── Distância estimada ──
    const distPx  = Math.hypot(dx - hx, dy - hy);
    // escala aproximada: imagem ~310px = ~200m no campus
    const distM   = Math.round(distPx * (200 / imgNW));
    const caminhando = Math.ceil(distM / 80); // ~80m/min caminhando
    document.getElementById('rb-text').textContent =
      `Rota em linha reta • ~${distM}m • ${caminhando} min a pé`;
  }

  img.onload = () => { setupOverlays(); resetView(); };
  if (img.complete) { setupOverlays(); resetView(); }

  // ── Clamp + aplicar transform ──
  function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

  function applyTransform() {
    const aw = area.clientWidth;
    const ah = area.clientHeight;
    const sw = imgNW * scale;
    const sh = imgNH * scale;
    tx = sw <= aw ? (aw - sw) / 2 : clamp(tx, aw - sw, 0);
    ty = sh <= ah ? (ah - sh) / 2 : clamp(ty, ah - sh, 0);
    container.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    container.style.transformOrigin = '0 0';
  }

  // Centraliza entre "você está aqui" e o destino
  function resetView() {
    if (!imgNW) return;
    const aw = area.clientWidth;
    const ah = area.clientHeight;
    const sheetH = document.getElementById('bottom-sheet').offsetHeight || 180;

    // Centro da rota
    const midX = imgNW * (herePos.px + pinPos.px) / 200;
    const midY = imgNH * (herePos.py + pinPos.py) / 200;

    // Zoom para cobrir o mapa
    scale = Math.max(aw / imgNW, ah / imgNH);

    // Centralizar o ponto médio da rota na área visível acima do painel
    const visibleCenterY = (ah - sheetH) / 2;
    tx = aw / 2      - midX * scale;
    ty = visibleCenterY - midY * scale;
    applyTransform();
  }

  // ── Zoom ──
  function zoomAt(factor, cx, cy) {
    const ns = clamp(scale * factor, 0.4, 8);
    const r  = ns / scale;
    tx = cx - (cx - tx) * r;
    ty = cy - (cy - ty) * r;
    scale = ns;
    applyTransform();
  }

  document.getElementById('btn-zi').onclick = () => zoomAt(1.35, area.clientWidth/2, area.clientHeight/2);
  document.getElementById('btn-zo').onclick = () => zoomAt(1/1.35, area.clientWidth/2, area.clientHeight/2);
  document.getElementById('btn-zr').onclick = resetView;

  area.addEventListener('wheel', e => {
    e.preventDefault();
    const r = area.getBoundingClientRect();
    zoomAt(e.deltaY > 0 ? 0.88 : 1.14, e.clientX - r.left, e.clientY - r.top);
  }, { passive: false });

  // ── Pan mouse ──
  let dragging = false, ox = 0, oy = 0, stx = 0, sty = 0;
  area.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; ox = e.clientX; oy = e.clientY; stx = tx; sty = ty;
    area.classList.add('grabbing'); e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = stx + (e.clientX - ox); ty = sty + (e.clientY - oy); applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; area.classList.remove('grabbing'); });

  // ── Pan + pinch touch ──
  let touches = {};
  area.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
    const ids = Object.keys(touches).filter(k => k !== '_lastDist');
    if (ids.length === 1) {
      dragging = true;
      ox = touches[ids[0]].x; oy = touches[ids[0]].y; stx = tx; sty = ty;
    }
  }, { passive: false });

  area.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
    const ids = Object.keys(touches).filter(k => k !== '_lastDist');
    if (ids.length === 1 && dragging) {
      tx = stx + (touches[ids[0]].x - ox);
      ty = sty + (touches[ids[0]].y - oy);
      applyTransform();
    }
    if (ids.length === 2) {
      const a = touches[ids[0]], b = touches[ids[1]];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
      const r = area.getBoundingClientRect();
      if (touches._lastDist) zoomAt(dist / touches._lastDist, cx - r.left, cy - r.top);
      touches._lastDist = dist;
    }
  }, { passive: false });

  area.addEventListener('touchend', e => {
    for (const t of e.changedTouches) delete touches[t.identifier];
    touches._lastDist = null;
    if (Object.keys(touches).filter(k => k !== '_lastDist').length < 1) dragging = false;
  });

  // ── Ajustes de resize ──
  window.addEventListener('resize', () => {
    if (imgNW) applyTransform();
    const sheet = document.getElementById('bottom-sheet');
    const btns  = document.getElementById('zoom-btns');
    if (sheet && btns) btns.style.bottom = (sheet.offsetHeight + 14) + 'px';
  });

  // Posicionar zoom btns após render
  setTimeout(() => {
    const sheet = document.getElementById('bottom-sheet');
    const btns  = document.getElementById('zoom-btns');
    if (sheet && btns) btns.style.bottom = (sheet.offsetHeight + 14) + 'px';
  }, 100);
</script>
</body>
</html>
